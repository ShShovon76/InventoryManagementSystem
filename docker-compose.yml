services:

  mysql-db:
    image: mysql:8.0
    container_name: inventory-mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventory_db

    ports:
      - "3307:3306"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  inventory-app:
    build: .
    container_name: inventory-app

    ports:
      - "8080:8080"

    depends_on:
      mysql-db:
        condition: service_healthy