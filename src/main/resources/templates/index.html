<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: header">
    <title>Welcome - Inventory Management System</title>
</head>
<body>
<div class="container mt-5 fade-in">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card">
                <div class="card-header" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                    <h1 class="text-white">Welcome to Inventory Management System</h1>
                </div>
                <div class="card-body">
                    <i class="fas fa-warehouse fa-5x" style="color: #667eea;"></i>
                    <h3 class="mt-3">Complete Solution for Managing Your Inventory</h3>
                    <p class="text-muted">Manage categories, products, inventory levels, and customer orders efficiently.</p>

                    <div class="row mt-4">
                        <div class="col-md-3">
                            <div class="dashboard-card">
                                <i class="fas fa-tags fa-2x" style="color: #667eea;"></i>
                                <h5>Categories</h5>
                                <p>Organize products</p>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="dashboard-card">
                                <i class="fas fa-box fa-2x" style="color: #764ba2;"></i>
                                <h5>Products</h5>
                                <p>Manage inventory</p>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="dashboard-card">
                                <i class="fas fa-chart-line fa-2x" style="color: #28a745;"></i>
                                <h5>Analytics</h5>
                                <p>Track performance</p>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="dashboard-card">
                                <i class="fas fa-shopping-cart fa-2x" style="color: #ffc107;"></i>
                                <h5>Orders</h5>
                                <p>Process orders</p>
                            </div>
                        </div>
                    </div>

                    <a th:href="@{/dashboard}" class="btn btn-primary btn-lg mt-3">
                        <i class="fas fa-tachometer-alt"></i> Go to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
