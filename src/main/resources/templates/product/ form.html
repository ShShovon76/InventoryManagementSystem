<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/header :: header">
    <title>Product Form - Inventory Management</title>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div th:replace="fragments/sidebar :: sidebar"></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2" th:text="${productId} ? 'Edit Product' : 'Create Product'">
                    Product Form
                </h1>
            </div>

            <div class="row fade-in">
                <div class="col-md-8">
                    <div class="card">
                        <div class="card-body">
                            <form th:action="${productId} ? @{/products/edit/{id}(id=${productId})} : @{/products/create}"
                                  th:object="${product}" method="post">

                                <div class="mb-3">
                                    <label for="name" class="form-label">Product Name *</label>
                                    <input type="text" class="form-control" id="name"
                                           th:field="*{name}" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}"
                                         th:errors="*{name}">Name is required</div>
                                </div>

                                <div class="mb-3">
                                    <label for="description" class="form-label">Description</label>
                                    <textarea class="form-control" id="description" rows="3"
                                              th:field="*{description}"></textarea>
                                </div>

                                <div class="mb-3">
                                    <label for="price" class="form-label">Price *</label>
                                    <div class="input-group">
                                        <span class="input-group-text">$</span>
                                        <input type="number" step="0.01" class="form-control" id="price"
                                               th:field="*{price}" required>
                                    </div>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}"
                                         th:errors="*{price}">Valid price is required</div>
                                </div>

                                <div class="mb-3">
                                    <label for="categoryId" class="form-label">Category *</label>
                                    <select class="form-select" id="categoryId" th:field="*{categoryId}" required>
                                        <option value="">Select Category</option>
                                        <option th:each="cat : ${categories}"
                                                th:value="${cat.id}"
                                                th:text="${cat.name}">
                                        </option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save"></i> Save Product
                                    </button>
                                    <a th:href="@{/products}" class="btn btn-secondary">
                                        <i class="fas fa-times"></i> Cancel
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <div class="card-header">
                            <i class="fas fa-info-circle"></i> Help
                        </div>
                        <div class="card-body">
                            <p><strong>Product Name:</strong> Clear, descriptive name.</p>
                            <p><strong>Price:</strong> Must be greater than 0.</p>
                            <p><strong>Category:</strong> Select appropriate category.</p>
                            <p><strong>Note:</strong> After creating product, add inventory stock.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
