<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="sidebar" class="col-md-3 col-lg-2 px-0 sidebar">
    <div class="position-sticky pt-3">
        <ul class="nav flex-column">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/dashboard}" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/categories}" th:classappend="${activePage == 'categories'} ? 'active' : ''">
                    <i class="fas fa-tags"></i> Categories
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/products}" th:classappend="${activePage == 'products'} ? 'active' : ''">
                    <i class="fas fa-box"></i> Products
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/inventory}" th:classappend="${activePage == 'inventory'} ? 'active' : ''">
                    <i class="fas fa-warehouse"></i> Inventory
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/orders}" th:classappend="${activePage == 'orders'} ? 'active' : ''">
                    <i class="fas fa-shopping-cart"></i> Orders
                </a>
            </li>
        </ul>
    </div>
</div>
</html>
